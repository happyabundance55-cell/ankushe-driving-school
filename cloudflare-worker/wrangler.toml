name = "sarathi-cashfree"
main = "worker.js"
compatibility_date = "2024-01-01"

# Secrets (set via `wrangler secret put <NAME>`, never committed):
#   CF_APP_ID              — Cashfree client id (same merchant account as Healthyabundance)
#   CF_SECRET_KEY          — Cashfree client secret
#   FIREBASE_SERVICE_ACCOUNT — full JSON key for the sarathi-driving-school Firebase
#                              project's service account (Project Settings > Service accounts
#                              > Generate new private key), pasted as a single-line string.
