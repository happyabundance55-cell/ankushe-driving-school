<!DOCTYPE html>

  <script>
    // Runs before first paint — same storage key as every other page's
    // toggle, so a preference set anywhere carries over everywhere.
    (function() {
      const saved = localStorage.getItem('sarathi-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css" rel="stylesheet">
  <style>
    /* ── Tom Select base overrides ─────────────────────────────── */
    .ts-wrapper.single .ts-control {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: .9rem;
      font-family: inherit;
      padding: .58rem .85rem;
      background: var(--white);
      color: var(--text);
      box-shadow: none;
      cursor: pointer;
    }
    .ts-wrapper.single.focus .ts-control {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .ts-wrapper.single.input-active .ts-control {
      border-color: var(--primary);
      background: var(--white); color: var(--text);
    }
    .ts-dropdown {
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      font-size: .9rem;
      font-family: inherit;
      background: var(--white);
      color: var(--text);
      margin-top: 4px;
      overflow: hidden;
    }
    .ts-dropdown .ts-dropdown-content { max-height: 240px; }
    .ts-dropdown .option {
      padding: .6rem 1rem;
      cursor: pointer;
      transition: background var(--transition);
    }
    .ts-dropdown .option:hover,
    .ts-dropdown .option.active  { background: var(--primary-light); color: var(--primary); }
    .ts-dropdown .option.selected { background: var(--primary-light); color: var(--primary); font-weight: 600; }
    .ts-dropdown input.ts-search {
      border: none;
      border-bottom: 1.5px solid var(--border);
      border-radius: 0;
      padding: .55rem 1rem;
      font-size: .875rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      width: 100%;
      outline: none;
    }
    .ts-dropdown input.ts-search:focus { background: var(--bg); }
    .ts-dropdown .no-results { padding: .75rem 1rem; color: var(--text-muted); font-size: .875rem; }
    .ts-wrapper .clear-button { color: var(--text-muted); }

    /* ── Modal ──────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 480px;
      padding: 1.75rem;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1.25rem;
      line-height: 1;
      padding: .2rem .4rem;
    }
    .modal-close:hover { color: var(--text); }
    .test-past td { opacity: .55; }

    /* ── Status pills ────────────────────────────────────────────── */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: .38rem;
      padding: .28rem .75rem;
      border-radius: var(--radius-pill);
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .status-pill::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-scheduled {
      background: #fff8ec;
      color: #92400e;
      border: 1.5px solid #fde68a;
    }
    .status-scheduled::before { background: #f59e0b; box-shadow: 0 0 0 2px #fde68a; }

    .status-completed {
      background: #ecfdf5;
      color: #065f46;
      border: 1.5px solid #6ee7b7;
    }
    .status-completed::before { background: #10b981; }

    .status-cancelled {
      background: #fef2f2;
      color: #991b1b;
      border: 1.5px solid #fca5a5;
    }
    .status-cancelled::before { background: #ef4444; }

    .status-overdue {
      background: #fff1f2;
      color: #9f1239;
      border: 1.5px solid #fda4af;
    }
    .status-overdue::before { background: #f43f5e; animation: pulse-dot 1.4s infinite; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    /* Wider dropdown inside modal */
    #modal-overlay .ts-dropdown { z-index: 600; }

    /* ── Date & time picker ──────────────────────────────────────
       Native <input type="datetime-local"> stays the real value store
       (nothing else in the page changes), but its own popup/segment
       highlighting is unstylable OS chrome (that blue selection you
       can't override). On a mouse/desktop we hide it and drive it from
       this custom calendar instead; on touch it's shown as-is so phones
       keep their native sliding picker. */
    .dt-field { position: relative; }
    .dt-field .dt-native { display: none; }
    .dt-field.is-touch .dt-native {
      display: block; width: 100%; max-width: 100%;
    }
    .dt-field.is-touch .dt-display { display: none; }
    .dt-display {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: .58rem .85rem;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--white); color: var(--text);
      font-size: .9rem; font-family: inherit; cursor: pointer;
      transition: border-color var(--transition);
    }
    .dt-display:hover { border-color: var(--primary-muted); }
    .dt-display svg { color: var(--text-muted); flex-shrink: 0; margin-left: .5rem; }
    .dt-dropdown {
      display: none; position: absolute; top: calc(100% + 6px); left: 0; z-index: 50;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
      padding: 1rem; width: 270px;
    }
    .dt-dropdown.open { display: block; }
    .dt-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .6rem; }
    .dt-cal-title { font-weight: 700; font-size: .92rem; }
    .dt-nav-btn {
      width: 26px; height: 26px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: none; cursor: pointer; font-size: .95rem; color: var(--text);
      display: flex; align-items: center; justify-content: center;
      transition: background .12s;
    }
    .dt-nav-btn:hover { background: var(--bg-hover); }
    .dt-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      font-size: .68rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
      color: var(--text-muted); text-align: center; padding-bottom: .3rem;
    }
    .dt-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: .15rem; }
    .dt-day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: .82rem; cursor: pointer; color: var(--text);
      transition: background .12s, color .12s;
    }
    .dt-day:hover { background: var(--primary-light); color: var(--primary); }
    .dt-day.selected { background: var(--primary); color: #fff; font-weight: 700; }
    .dt-day.today:not(.selected) { border: 1.5px solid var(--primary-muted); }
    .dt-day.other-month { color: var(--text-subtle); opacity: .45; cursor: default; }
    .dt-day.other-month:hover { background: none; color: var(--text-subtle); }
    .dt-time-row {
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      margin-top: .85rem; padding-top: .85rem; border-top: 1.5px solid var(--border);
    }
    .dt-time-group { display: flex; flex-direction: column; align-items: center; gap: .15rem; }
    .dt-time-step {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      font-size: .55rem; line-height: 1; padding: .15rem; transition: color .12s;
    }
    .dt-time-step:hover { color: var(--primary); }
    .dt-time-val {
      width: 2.5rem; text-align: center; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      padding: .3rem 0; font-size: .95rem; font-weight: 700; color: var(--text);
      background: var(--white); font-family: inherit; cursor: default;
    }
    .dt-time-colon { font-weight: 700; font-size: 1.05rem; color: var(--text-muted); }
    .dt-ampm { display: flex; flex-direction: column; gap: .2rem; margin-left: .3rem; }
    .dt-ampm-btn {
      padding: .22rem .5rem; font-size: .68rem; font-weight: 700; font-family: inherit;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--white); color: var(--text-muted); cursor: pointer;
      transition: background .12s, color .12s, border-color .12s;
    }
    .dt-ampm-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .dt-actions { display: flex; margin-top: .85rem; }
    #modal-overlay .dt-dropdown { z-index: 620; }
  </style>

<script>
let _allTests  = [];
let _students  = [];
let _editingId = null;
let tsFilter   = null;
let tsStudent  = null;

// ── Date & time picker (see .dt-field CSS above for why) ──────────────
let _dtYear, _dtMonth, _dtDay = null, _dtHour = 12, _dtMinute = 0, _dtAmpm = 'AM';

if (window.matchMedia('(pointer: coarse)').matches) {
  document.getElementById('m-datetime-field').classList.add('is-touch');
}

function _dtSetValue(val) {
  document.getElementById('m-datetime').value = val;
  if (val) {
    const [datePart, timePart] = val.split('T');
    const [y, mo, d] = datePart.split('-').map(Number);
    const [h24, mi]  = timePart.split(':').map(Number);
    _dtYear = y; _dtMonth = mo - 1; _dtDay = d;
    _dtHour = h24 % 12 || 12; _dtMinute = mi; _dtAmpm = h24 >= 12 ? 'PM' : 'AM';
  } else {
    const now = new Date();
    _dtYear = now.getFullYear(); _dtMonth = now.getMonth(); _dtDay = null;
    _dtHour = 12; _dtMinute = 0; _dtAmpm = 'AM';
  }
  _dtUpdateDisplay();
  if (document.getElementById('m-datetime-dropdown').classList.contains('open')) _dtRenderCalendar();
}

function _dtSyncNativeValue() {
  if (_dtDay == null) { document.getElementById('m-datetime').value = ''; _dtUpdateDisplay(); return; }
  let h24 = _dtHour % 12;
  if (_dtAmpm === 'PM') h24 += 12;
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('m-datetime').value = `${_dtYear}-${pad(_dtMonth + 1)}-${pad(_dtDay)}T${pad(h24)}:${pad(_dtMinute)}`;
  _dtUpdateDisplay();
}

function _dtUpdateDisplay() {
  const el = document.getElementById('m-datetime-display-text');
  if (_dtDay == null) { el.textContent = 'Select date & time'; el.style.color = 'var(--text-subtle)'; return; }
  el.style.color = '';
  const dateStr = new Date(_dtYear, _dtMonth, _dtDay).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  el.textContent = `${dateStr}, ${_dtHour}:${String(_dtMinute).padStart(2, '0')} ${_dtAmpm}`;
}

function _dtRenderCalendar() {
  document.getElementById('dt-cal-title').textContent =
    new Date(_dtYear, _dtMonth, 1).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });

  const firstDow     = new Date(_dtYear, _dtMonth, 1).getDay();
  const daysInMonth  = new Date(_dtYear, _dtMonth + 1, 0).getDate();
  const prevDaysInMo = new Date(_dtYear, _dtMonth, 0).getDate();
  const now = new Date();

  const cells = [];
  for (let i = firstDow - 1; i >= 0; i--) cells.push({ day: prevDaysInMo - i, muted: true });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ day: d, muted: false });
  let nextDay = 1;
  while (cells.length % 7 !== 0) cells.push({ day: nextDay++, muted: true });

  document.getElementById('dt-days').innerHTML = cells.map(c => {
    const isToday = !c.muted && _dtYear === now.getFullYear() && _dtMonth === now.getMonth() && c.day === now.getDate();
    const isSel   = !c.muted && _dtDay === c.day;
    return `<div class="dt-day${c.muted ? ' other-month' : ''}${isSel ? ' selected' : ''}${(isToday && !isSel) ? ' today' : ''}"
                 ${c.muted ? '' : `onclick="_dtSelectDay(${c.day})"`}>${c.day}</div>`;
  }).join('');

  document.getElementById('dt-hour-val').value   = String(_dtHour).padStart(2, '0');
  document.getElementById('dt-minute-val').value = String(_dtMinute).padStart(2, '0');
  document.getElementById('dt-am-btn').classList.toggle('active', _dtAmpm === 'AM');
  document.getElementById('dt-pm-btn').classList.toggle('active', _dtAmpm === 'PM');
}

function _dtSelectDay(day) {
  _dtDay = day;
  _dtSyncNativeValue();
  _dtRenderCalendar();
}

function _dtChangeMonth(delta) {
  _dtMonth += delta;
  if (_dtMonth < 0)  { _dtMonth = 11; _dtYear--; }
  if (_dtMonth > 11) { _dtMonth = 0;  _dtYear++; }
  _dtRenderCalendar();
}

function _dtStepTime(kind, dir) {
  if (kind === 'hour') {
    _dtHour += dir;
    if (_dtHour > 12) _dtHour = 1;
    if (_dtHour < 1)  _dtHour = 12;
  } else {
    _dtMinute += dir;
    if (_dtMinute > 59) _dtMinute = 0;
    if (_dtMinute < 0)  _dtMinute = 59;
  }
  if (_dtDay != null) _dtSyncNativeValue();
  _dtRenderCalendar();
}

function _dtSetAmpm(v) {
  _dtAmpm = v;
  if (_dtDay != null) _dtSyncNativeValue();
  _dtRenderCalendar();
}

function _dtToggle() {
  const dd = document.getElementById('m-datetime-dropdown');
  const willOpen = !dd.classList.contains('open');
  dd.classList.toggle('open', willOpen);
  if (willOpen) _dtRenderCalendar();
}

document.addEventListener('click', e => {
  // composedPath(), not field.contains(e.target) — a day-cell click re-renders
  // #dt-days (to show the new selection) while this same click is still
  // bubbling, detaching e.target from the document. contains() on a detached
  // node is always false, which read as "clicked outside" and closed the
  // dropdown right after every day pick. composedPath() is captured at
  // dispatch time, before that mutation, so it's unaffected.
  const field = document.getElementById('m-datetime-field');
  if (field && !e.composedPath().includes(field)) document.getElementById('m-datetime-dropdown').classList.remove('open');
});

_dtSetValue('');

bootstrapPage(['admin']).then(async () => {
  _students = await getStudents({ status: 'all' });
  _initTomSelects();
  await _loadTests();

  const preStudentId = getQueryParam('student');
  if (preStudentId) {
    openModal();
    tsStudent.setValue(preStudentId);
  }
});

function _initTomSelects() {
  const filterOpts = _students.map(s => ({
    value: s.id,
    text:  `${s.name} (${s.enrollmentNumber})`
  }));

  tsFilter = new TomSelect('#filter-student', {
    options:     filterOpts,
    placeholder: 'All Students',
    allowEmptyOption: true,
    maxOptions:  500,
    onChange:    () => applyFilter(),
    render: {
      option: (data, escape) => `<div>${escape(data.text)}</div>`,
      item:   (data, escape) => `<div>${escape(data.text)}</div>`
    }
  });

  // Scheduling a NEW test only offers active students — same reasoning as
  // attendance.html's mark-student: an inactive student shouldn't be usable
  // without reactivating first (which re-checks the plan's student cap).
  const modalOpts = _students.filter(s => s.status === 'active').map(s => ({
    value: s.id,
    text:  `${s.name} (${s.enrollmentNumber})`
  }));

  tsStudent = new TomSelect('#m-student', {
    options:     modalOpts,
    placeholder: '— Search student —',
    allowEmptyOption: true,
    maxOptions:  500,
    render: {
      option: (data, escape) => `<div style="padding:.1rem 0"><strong>${escape(data.text.split(' (')[0])}</strong><span style="color:var(--text-muted);font-size:.82rem;margin-left:.4rem">${escape('(' + data.text.split('(')[1])}</span></div>`,
      item:   (data, escape) => `<div>${escape(data.text)}</div>`
    }
  });
}

async function _loadTests() {
  _allTests = await getAllDrivingTests();
  applyFilter();
}

function applyFilter() {
  const studentId = tsFilter ? tsFilter.getValue() : '';
  const status    = document.getElementById('status-filter').value;

  let list = _allTests;
  if (status !== 'all')  list = list.filter(t => t.status === status);
  if (studentId)         list = list.filter(t => t.studentId === studentId);

  renderTable(list);
}

function renderTable(tests) {
  const body = document.getElementById('tests-body');
  document.getElementById('test-count').textContent =
    `${tests.length} test${tests.length !== 1 ? 's' : ''}`;

  if (!tests.length) {
    body.innerHTML = '<tr><td colspan="7"><div class="empty-state"><h3>No tests found</h3></div></td></tr>';
    return;
  }

  const now = Date.now();
  body.innerHTML = tests.map(t => {
    const ts      = t.scheduledAt ? t.scheduledAt.toMillis() : 0;
    const isOverdue = ts < now && t.status === 'scheduled';
    const dtStr   = t.scheduledAt ? _fmtDateTime(t.scheduledAt.toDate()) : '—';

    const statusPill = isOverdue
      ? `<span class="status-pill status-overdue">Overdue</span>`
      : {
          scheduled: `<span class="status-pill status-scheduled">Scheduled</span>`,
          completed: `<span class="status-pill status-completed">Completed</span>`,
          cancelled: `<span class="status-pill status-cancelled">Cancelled</span>`
        }[t.status] || `<span class="status-pill status-cancelled">${escapeHtml(t.status)}</span>`;

    return `<tr class="${isOverdue ? 'test-past' : ''}">
      <td><strong>${escapeHtml(t.studentName)}</strong></td>
      <td class="td-muted">${escapeHtml(t.enrollmentNumber || '—')}</td>
      <td style="${isOverdue ? 'color:var(--danger);font-weight:600' : ''}">${dtStr}</td>
      <td class="td-muted">${escapeHtml(t.venue || '—')}</td>
      <td class="td-muted" style="max-width:160px;white-space:normal;font-size:.85rem">${escapeHtml(t.notes || '—')}</td>
      <td>${statusPill}</td>
      <td>
        <div style="display:flex;gap:.35rem">
          <button class="btn btn-sm btn-outline" onclick="editTest('${t.id}')">Edit</button>
          <button class="btn btn-sm btn-danger"  onclick="cancelTest('${t.id}')">Cancel</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function _fmtDateTime(d) {
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) +
    ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

function _localDateTimeValue(ts) {
  const d = ts.toDate();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function openModal() {
  _editingId = null;
  document.getElementById('modal-heading').textContent = 'Schedule Driving Test';
  tsStudent.clear();
  tsStudent.enable();
  _dtSetValue('');
  document.getElementById('m-venue').value     = '';
  document.getElementById('m-notes').value     = '';
  document.getElementById('m-status').value    = 'scheduled';
  document.getElementById('m-status-group').style.display = 'none';
  document.getElementById('m-error').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

function editTest(id) {
  const t = _allTests.find(x => x.id === id);
  if (!t) return;
  _editingId = id;
  document.getElementById('modal-heading').textContent = 'Edit Driving Test';
  // The student may have gone inactive since this test was scheduled — the
  // picker's options no longer include them (see _initTomSelects), so make
  // sure their name still shows correctly on an edit even though the field
  // is about to be disabled anyway (you can't reassign a test's student).
  if (!tsStudent.options[t.studentId]) {
    tsStudent.addOption({ value: t.studentId, text: `${t.studentName} (${t.enrollmentNumber || ''})` });
  }
  tsStudent.setValue(t.studentId);
  tsStudent.disable();
  _dtSetValue(t.scheduledAt ? _localDateTimeValue(t.scheduledAt) : '');
  document.getElementById('m-venue').value     = t.venue || '';
  document.getElementById('m-notes').value     = t.notes || '';
  document.getElementById('m-status').value    = t.status || 'scheduled';
  document.getElementById('m-status-group').style.display = '';
  document.getElementById('m-error').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('m-datetime-dropdown').classList.remove('open');
  _editingId = null;
}

async function saveTest() {
  const errEl      = document.getElementById('m-error');
  errEl.style.display = 'none';
  const studentId  = tsStudent.getValue();
  const datetimeVal = document.getElementById('m-datetime').value;
  const venue      = document.getElementById('m-venue').value.trim();
  const notes      = document.getElementById('m-notes').value.trim();
  const status     = document.getElementById('m-status').value;

  if (!studentId)   { errEl.textContent = 'Select a student.';      errEl.style.display = ''; return; }
  if (!datetimeVal) { errEl.textContent = 'Select a date and time.'; errEl.style.display = ''; return; }

  const btn = document.querySelector('#modal-overlay .btn-primary');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    if (_editingId) {
      await updateDrivingTest(_editingId, { scheduledAt: datetimeVal, venue, notes, status });
      showToast('Test updated.', 'success');
    } else {
      await scheduleDrivingTest(studentId, { scheduledAt: datetimeVal, venue, notes });
      showToast('Test scheduled.', 'success');
    }
    closeModal();
    await _loadTests();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = '';
  } finally {
    btn.disabled = false; btn.textContent = 'Save';
  }
}

async function cancelTest(id) {
  if (!confirm('Mark this test as cancelled?')) return;
  try {
    await updateDrivingTest(id, { status: 'cancelled' });
    showToast('Test cancelled.', 'success');
    await _loadTests();
  } catch (e) {
    showToast(e.message, 'danger');
  }
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
</script>
</body>
</html>
