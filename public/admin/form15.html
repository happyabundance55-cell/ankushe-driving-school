<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Runs before first paint — same storage key as every other page's
    // toggle, so a preference set anywhere carries over everywhere.
    (function() {
      const saved = localStorage.getItem('sarathi-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form 15 — Sarathi</title>
  <script src="../shared/js/config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="../shared/js/tenant.js"></script>
  <script src="../shared/js/auth.js"></script>
  <script src="../shared/js/db.js"></script>
  <script src="../shared/js/utils.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; font-size: 12px; background: #fff; color: #000; }

    .print-btn {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      padding: .6rem 1.2rem; background: #1d4ed8; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: .9rem;
    }
    .print-btn:hover { background: #1e40af; }

    .form-wrap { max-width: 760px; margin: 0 auto; padding: 24px 32px 40px; }

    .form-header { text-align: center; margin-bottom: 14px; }
    .form-header .f15-title  { font-size: 20px; font-weight: bold; letter-spacing: .05em; margin-bottom: 6px; }
    .form-header .f15-rule   { font-size: 12px; margin-bottom: 5px; }
    .form-header .f15-reg    { font-size: 12px; margin-bottom: 10px; }
    .form-header .f15-school { font-size: 17px; font-weight: bold; margin-bottom: 5px; }
    .form-header .f15-govt   { font-size: 13px; font-weight: bold; margin-bottom: 8px; }
    .form-header .f15-addr   { font-size: 11px; border-bottom: 1.5px solid #000; padding-bottom: 8px; margin-bottom: 10px; line-height: 1.6; }

    .info-line { display: flex; gap: 0; border-bottom: 1px solid #000; padding: 5px 0; font-size: 12px; align-items: center; }
    .info-line .lbl { font-weight: bold; margin-right: 4px; }
    .info-line .val { min-width: 120px; margin-right: 24px; font-weight: bold; }

    .training-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .training-table th, .training-table td {
      border: 1px solid #000; padding: 5px 6px; text-align: center; font-size: 11px;
    }
    .training-table th { font-weight: bold; }
    .training-table .name-col { text-align: left; font-size: 11px; }
    .training-table td.type-col { font-style: italic; }

    .total-row { margin-top: 12px; font-weight: bold; font-size: 13px; }
    .loading-msg { text-align: center; padding: 60px; font-size: 1rem; color: #555; }

    @media print {
      .print-btn { display: none; }
      .form-wrap { padding: 4px 8px 16px; }
      body { font-size: 11px; }
    }
    @page { size: A4; margin: 12mm; }
  </style>
</head>
<body>

<button class="print-btn" onclick="window.print()">🖨 Print Form 15</button>

<div class="form-wrap" id="form-wrap">
  <div class="loading-msg">Loading…</div>
</div>

<script>
const studentId = getQueryParam('id');
if (!studentId) { document.getElementById('form-wrap').innerHTML = '<div style="padding:2rem;color:red">No student ID provided.</div>'; }

const RELATION_SHORT = { son: 'S/o', wife: 'W/o', daughter: 'D/o', co: 'C/o' };

function fmtD(val) {
  if (!val) return '—';
  const d = val && val.toDate ? val.toDate() : new Date(val);
  if (isNaN(d)) return '—';
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  return `${dd}-${mm}-${d.getFullYear()}`;
}

function fmtTime(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  if (isNaN(d)) return '—';
  return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function fmtTimePlusMins(ts, mins) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  if (isNaN(d)) return '—';
  return new Date(d.getTime() + mins * 60000).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function fmtDateOnly(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  if (isNaN(d)) return '—';
  const dd = String(d.getDate()).padStart(2, '0');
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  return `${dd}-${mm}-${d.getFullYear()}`;
}

(async function() {
  await bootstrapPage(['admin', 'mentor']);
  const [student, attendance] = await Promise.all([
    getStudent(studentId),
    getStudentAttendance(studentId)
  ]);
  if (!student) {
    document.getElementById('form-wrap').innerHTML = '<div style="padding:2rem;color:red">Student not found.</div>';
    return;
  }
  renderForm15(student, attendance);
})();

function renderForm15(s, attendance) {
  const relationShort = RELATION_SHORT[s.relation] || 'S/o';

  const enrollDate = s.enrollmentDate
    ? fmtD(s.enrollmentDate)
    : '—';

  const sortedAtt = [...attendance].sort((a, b) => {
    const toMs = d => d?.toMillis ? d.toMillis() : new Date(d || 0).getTime();
    return toMs(a.date) - toMs(b.date);
  });

  const SESSION_MINS = getTenant().sessionMins || 120;
  const totalSessions = sortedAtt.length;
  const totalMinutes  = totalSessions * SESSION_MINS;
  const totalHours    = Math.floor(totalMinutes / 60);
  const remMins       = totalMinutes % 60;

  const tableRows = sortedAtt.map((a, i) => `
    <tr>
      <td>${i + 1}</td>
      <td class="type-col">Practical</td>
      <td>${fmtDateOnly(a.date)}</td>
      <td>${fmtTime(a.date)}</td>
      <td>${fmtTimePlusMins(a.date, SESSION_MINS)}</td>
      <td>${SESSION_MINS}</td>
      <td class="name-col">${escapeHtml((s.name || '').toUpperCase())}</td>
      <td class="name-col">${escapeHtml((a.mentorName || '—').toUpperCase())}</td>
    </tr>`).join('');

  const emptyRows = Math.max(0, 5 - sortedAtt.length);
  const blankRows = Array(emptyRows).fill(`<tr>
    <td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td>
  </tr>`).join('');

  document.getElementById('form-wrap').innerHTML = `
    <div class="form-header">
      <div class="f15-title">FORM 15</div>
      <div class="f15-rule">Under rule 27(i)</div>
      <div class="f15-reg">Register showing the driving hours spent by a trainee</div>
      <div class="f15-school">${escapeHtml((getTenant().name || '').toUpperCase())}</div>
      ${getTenant().govtRecognised ? '<div class="f15-govt">(GOVT.RECOGNISED)</div>' : ''}
      <div class="f15-addr">${escapeHtml(getTenant().address || '')}</div>
    </div>

    <div class="info-line">
      <span class="lbl">Name of the trainee</span>
      <span class="val">${escapeHtml(s.name.toUpperCase())}</span>
      <span class="lbl">${escapeHtml(relationShort)} :</span>
      <span class="val">${escapeHtml((s.guardianName || '—').toUpperCase())}</span>
    </div>
    <div class="info-line">
      <span class="lbl">Enrollment Number :</span>
      <span class="val">${escapeHtml(s.enrollmentNumber)}</span>
      <span class="lbl">Date of Enrollment :</span>
      <span class="val">${enrollDate}</span>
    </div>
    <div class="info-line" style="border-bottom:1.5px solid #000;margin-bottom:4px">
      <span class="lbl">Class of vehicle</span>
      <span class="val" style="min-width:80px">: ${escapeHtml(s.vehicleClass || '—')}</span>
      <span class="lbl">Vehicle Reg No. Trained On</span>
      <span class="val">${escapeHtml(s.vehicleRegNo || '—')}</span>
    </div>

    <table class="training-table">
      <thead>
        <tr>
          <th rowspan="2">SI<br>No</th>
          <th rowspan="2">Type</th>
          <th rowspan="2">Date</th>
          <th colspan="3">Training Duration</th>
          <th rowspan="2">Trainee Name</th>
          <th rowspan="2">Instructor Name</th>
        </tr>
        <tr>
          <th>From Hour</th>
          <th>To Hour</th>
          <th>Minutes Spent</th>
        </tr>
      </thead>
      <tbody>
        ${tableRows}
        ${blankRows}
      </tbody>
    </table>

    <div class="total-row">
      Total Hours Spent For Practical Training :
      <span style="margin-left:8px">${totalHours} hr${totalHours !== 1 ? 's' : ''} ${remMins > 0 ? remMins + ' min' : ''} (${totalSessions} session${totalSessions !== 1 ? 's' : ''} × ${SESSION_MINS} min)</span>
    </div>
  `;
}
</script>
</body>
</html>
