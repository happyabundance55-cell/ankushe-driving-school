<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    // Runs before first paint — same storage key as every other page's
    // toggle, so a preference set anywhere carries over everywhere.
    (function() {
      const saved = localStorage.getItem('sarathi-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Sessions — Sarathi</title>
  <link rel="stylesheet" href="../shared/css/main.css">
  <script src="../shared/js/config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="../shared/js/tenant.js"></script>
  <script src="../shared/js/auth.js"></script>
  <script src="../shared/js/db.js"></script>
  <script src="../shared/js/utils.js"></script>
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="#"><img src="/favicon.svg" alt="Sarathi" style="width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.45),0 0 0 2px rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.22)" onerror="this.style.display='none'"> Sarathi</a>
  <button class="nav-hamburger" onclick="toggleNav()" aria-label="Menu"><span></span><span></span><span></span></button>
  <div class="nav-overlay" onclick="closeNav()"></div>
  <ul class="navbar-links">
    <li><a href="mark-attendance.html">Mark Attendance</a></li>
    <li><a href="my-sessions.html" class="active">My Sessions</a></li>
    <li><a href="#" class="nav-logout" onclick="logout();return false">Logout</a></li>
    <li>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </li>
  </ul>
</nav>

<div class="page-container" style="max-width:720px">
  <div id="root"><div class="loading"><div class="spinner"></div> Loading…</div></div>
</div>

<script>
bootstrapPage(['mentor']).then(async ({ profile }) => {
  const records = await getMentorAttendance(profile.uid);

  records.sort((a, b) => (b.date?.toMillis?.() || 0) - (a.date?.toMillis?.() || 0));

  const studentIds = [...new Set(records.map(r => r.studentId).filter(Boolean))];
  const studentMap = {};
  await Promise.all(studentIds.map(async id => {
    const s = await getStudent(id);
    if (s) studentMap[id] = s.name;
  }));

  const total = records.length;
  const uniqueStudents = studentIds.length;

  document.getElementById('root').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem">
      <div>
        <h2 style="font-size:1.3rem;font-weight:800;letter-spacing:-.02em">My Sessions</h2>
        <div style="color:var(--text-muted);font-size:.875rem;margin-top:.2rem">${profile.name}</div>
      </div>
      <div style="display:flex;gap:.75rem;flex-wrap:wrap">
        <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:.6rem 1.1rem;text-align:center;min-width:90px">
          <div style="font-size:1.6rem;font-weight:800;color:var(--primary)">${total}</div>
          <div style="font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">Sessions</div>
        </div>
        <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:.6rem 1.1rem;text-align:center;min-width:90px">
          <div style="font-size:1.6rem;font-weight:800;color:var(--primary)">${uniqueStudents}</div>
          <div style="font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em">Students</div>
        </div>
      </div>
    </div>

    ${total === 0 ? '<div class="alert alert-info">No sessions marked yet.</div>' : `
    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date &amp; Time</th>
              <th>Student</th>
              <th>Marked By</th>
            </tr>
          </thead>
          <tbody>
            ${records.map(r => `
              <tr>
                <td style="white-space:nowrap">${formatDateTime(r.date)}</td>
                <td>${escapeHtml(studentMap[r.studentId] || r.studentId || '—')}</td>
                <td><span class="badge badge-${r.markedByRole === 'student' ? 'primary' : 'success'}">${escapeHtml(r.markedByRole || '—')}</span></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`}
  `;
});
</script>
</body>
</html>
