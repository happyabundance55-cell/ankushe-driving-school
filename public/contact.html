<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      const saved = localStorage.getItem('sarathi-theme');
      const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    .legal-wrap { max-width: 680px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
    .legal-back { font-size: .85rem; font-weight: 700; color: var(--primary); text-decoration: none; display: inline-block; margin-bottom: 1.5rem; }
    .legal-wrap h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: .5rem; }
    .legal-wrap .sub { color: var(--text-muted); margin-bottom: 2rem; }
    .contact-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
    .contact-row { display: flex; align-items: center; gap: .85rem; padding: .75rem 0; border-bottom: 1px solid var(--border); }
    .contact-row:last-child { border-bottom: none; }
    .contact-row svg { color: var(--primary); flex-shrink: 0; }
    .contact-row a { color: var(--text); font-weight: 600; text-decoration: none; }
    .contact-row a:hover { color: var(--primary); }
    .contact-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); font-weight: 700; display: block; margin-bottom: .1rem; }
    .lp-footer { max-width: 1080px; margin: 2rem auto 0; padding: 2rem 1.5rem 3rem; text-align: center; color: var(--text-subtle); font-size: .82rem; border-top: 1px solid var(--border); }
    .lp-footer a { color: var(--text-subtle); text-decoration: none; }
    .lp-footer a:hover { color: var(--primary); }
    .lp-footer .sep { margin: 0 .5rem; }
  </style>
</head>
